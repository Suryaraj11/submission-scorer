spring.application.name=submission-scorer

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/submission_scorer
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson - serialize LocalDateTime as ISO-8601 strings, not timestamp arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=8080

# CORS
cors.allowed-origins=http://localhost:3000

# Anthropic API
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-6
